<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.title != "" %}{{ page.title }} &middot; {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.summary | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">Projects</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p class="muted">
        Built with Jekyll on GitHub Pages. Every dataset is self-generated synthetic data
        or public practice data, with provenance documented per project. No real casework.
      </p>
    </div>
  </footer>
</body>
</html>
